<!DOCTYPE html>
<html>
<head>
    <title>Generate PWA Icons</title>
</head>
<body>
    <h1>Generate PWA Icons</h1>
    <p>Buka file ini di browser untuk generate icon PWA</p>
    
    <canvas id="canvas192" width="192" height="192" style="border:1px solid #000; margin: 10px;"></canvas>
    <canvas id="canvas512" width="512" height="512" style="border:1px solid #000; margin: 10px;"></canvas>
    
    <br>
    <button onclick="downloadIcon('canvas192', 'icon-192.png')">Download 192x192</button>
    <button onclick="downloadIcon('canvas512', 'icon-512.png')">Download 512x512</button>

    <script>
        // Generate 192x192 icon
        const canvas192 = document.getElementById('canvas192');
        const ctx192 = canvas192.getContext('2d');
        
        // Background
        ctx192.fillStyle = '#3b82f6';
        ctx192.fillRect(0, 0, 192, 192);
        
        // Text
        ctx192.fillStyle = '#ffffff';
        ctx192.font = 'bold 80px Arial';
        ctx192.textAlign = 'center';
        ctx192.textBaseline = 'middle';
        ctx192.fillText('D', 96, 96);

        // Generate 512x512 icon
        const canvas512 = document.getElementById('canvas512');
        const ctx512 = canvas512.getContext('2d');
        
        // Background
        ctx512.fillStyle = '#3b82f6';
        ctx512.fillRect(0, 0, 512, 512);
        
        // Text
        ctx512.fillStyle = '#ffffff';
        ctx512.font = 'bold 220px Arial';
        ctx512.textAlign = 'center';
        ctx512.textBaseline = 'middle';
        ctx512.fillText('D', 256, 256);

        function downloadIcon(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
